<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f3; height: 100vh; display: flex; align-items: center; }
        .card-login { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-essalud { background-color: #00796b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card card-login p-4">
                    <div class="text-center mb-4">
                        <h2 style="color: #00796b; font-weight: bold;">SISTEMA TECH</h2>
                        <p class="text-muted">Ingresa tus datos para continuar</p>
                    </div>
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label">DNI / Usuario</label>
                            <input type="text" name="dni" class="form-control" placeholder="Ingresa tu DNI" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-essalud w-100 py-2">Iniciar Sesión</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/registro" class="text-decoration-none" style="color: #00796b;">¿No tienes cuenta? Regístrate</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
