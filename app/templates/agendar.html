<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Cita - Sistema Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .container { max-width: 500px; margin-top: 50px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background-color: #00796b; color: white; border-radius: 15px 15px 0 0; padding: 20px; text-align: center; }
        .btn-confirm { background-color: #00796b; color: white; font-weight: bold; padding: 12px; }
        .btn-confirm:hover { background-color: #004d40; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h3>Detalles de la Cita</h3>
            </div>
            <div class="card-body p-4">
                
                <!-- FORMULARIO CORREGIDO -->
                <form action="/confirmar_cita" method="POST">
                    
                    <!-- Campo oculto VITAL para la especialidad -->
                    <input type="hidden" name="especialidad" value="{{ especialidad }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Especialidad</label>
                        <input type="text" class="form-control" value="{{ especialidad }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tu DNI</label>
                        <input type="text" name="dni" class="form-control" placeholder="Ingresa tu DNI registrado" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Doctor(a)</label>
                        <select name="doctor" class="form-select" required>
                            <option value="" disabled selected>Elija un especialista...</option>
                            <option value="Dra. Claudia Ramos">Dra. Claudia Ramos</option>
                            <option value="Dr. Marco Espinoza">Dr. Marco Espinoza</option>
                            <option value="Dra. Jessie Aquino">Dra. Jessie Aquino</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Fecha</label>
                            <input type="date" name="fecha" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Hora</label>
                            <select name="hora" class="form-select" required>
                                <option value="08:00 AM">08:00 AM</option>
                                <option value="10:00 AM">10:00 AM</option>
                                <option value="04:00 PM">04:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <hr>

                    <!-- BOTÓN DE ENVÍO -->
                    <button type="submit" class="btn btn-confirm w-100">CONFIRMAR MI CITA</button>
                    
                    <div class="text-center mt-3">
                        <a href="/dashboard" class="text-decoration-none text-muted small">Cancelar y volver</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

</body>
</html>
